<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rehmani Edition | Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6f7fb; /* Ultra light grey-blue */
            --primary-luxury: #800020; /* Deep Burgundy */
            --gold-accent: #c9a543; /* Rich Gold */
            --text-dark: #333;
            --text-light: #fffafa;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Lato', sans-serif;
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Confetti Canvas - for 'Surprise' interaction */
        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }

        /* Main Container: Split-Screen Layout */
        .page-container {
            width: 90vw; height: 85vh;
            background: white;
            display: flex;
            border-radius: 5px; /* Minimal border for modern look */
            box-shadow: 0 30px 100px rgba(0,0,0,0.12);
            overflow: hidden;
            animation: pageFadeIn 1s ease-out;
        }

        /* --- Left Side: Dynamic Gallery --- */
        .left-panel {
            flex: 1;
            position: relative;
            background: #2a2a2a;
            overflow: hidden;
        }

        /* Yahan par image replace karne ke liye reference image lagayein */
        .left-panel .main-image {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 1;
            filter: grayscale(20%) sepia(10%); /* Subtle editorial look */
            transition: var(--transition-smooth);
        }

        .image-overlay-text {
            position: absolute;
            bottom: 60px; left: 50px;
            color: var(--text-light);
            font-family: 'Bodoni Moda', serif;
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* --- Right Side: Content & Luxe UI --- */
        .right-panel {
            flex: 1.2;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-image: radial-gradient(#e0e0e0 1px, transparent 1px); /* Subtle dot pattern */
            background-size: 20px 20px;
        }

        .header-luxe {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .logo-tag {
            font-family: 'Bodoni Moda', serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 4px;
        }

        /* Advanced Animated Rose Icon (SVG based, stylized) */
        .rose-icon-wrap {
            width: 50px; height: 50px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        
        .rose-icon-wrap svg {
            fill: var(--primary-luxury);
            width: 100%; height: 100%;
            animation: floatRose 4s infinite ease-in-out;
        }

        .rose-icon-wrap:hover {
            transform: scale(1.15) rotate(15deg);
        }

        /* Hero Text Area */
        .hero-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.8rem;
            color: var(--primary-luxury);
            line-height: 1;
            margin-bottom: 10px;
            animation: textSlideUp 1s ease 0.3s forwards;
            opacity: 0; transform: translateY(30px);
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: #555;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 50px;
            animation: textSlideUp 1s ease 0.6s forwards;
            opacity: 0; transform: translateY(30px);
        }

        /* Advanced 'Luxe Card' for Gift Section */
        .gift-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 2px;
            box-shadow: var(--glass-shadow);
            position: relative;
            margin-bottom: auto;
            cursor: pointer;
            transition: var(--transition-smooth);
            animation: textSlideUp 1s ease 0.9s forwards;
            opacity: 0; transform: translateY(30px);
        }
        
        .gift-box:hover {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .gift-tag {
            color: var(--gold-accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .gift-name {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.6rem;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .gift-desc {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Interactive Controls */
        .control-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 50px;
        }

        /* Advanced Button with Gold Accent */
        .surpise-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-family: 'Bodoni Moda', serif;
            color: var(--gold-accent);
            font-size: 1.2rem;
            letter-spacing: 1px;
            position: relative;
            padding: 10px 20px;
            transition: var(--transition-smooth);
        }
        
        .surpise-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 20px; width: 0; height: 1px;
            background: var(--gold-accent);
            transition: var(--transition-smooth);
        }

        .surpise-btn:hover::after {
            width: calc(100% - 40px);
        }

        .icon-circle {
            width: 15px; height: 15px;
            border: 2px solid var(--gold-accent);
            border-radius: 50%;
            margin-right: 15px;
            transition: var(--transition-smooth);
        }

        .surpise-btn:hover .icon-circle {
            background: var(--gold-accent);
        }

        /* Modal Structure for Surprise Message */
        #luxe-modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 3000;
            justify-content: center; align-items: center;
            animation: fadeIn 0.4s ease;
        }

        .modal-content {
            background: white;
            padding: 60px;
            width: 500px;
            text-align: center;
            border-radius: 2px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.5);
            animation: scaleIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        /* --- Animations Keyframes --- */
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes textSlideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatRose {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(10deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
