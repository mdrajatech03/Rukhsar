<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rehmani Edition | Rose Rain</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,700;1,400&family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #800020;
            --gold: #c9a543;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Rose Rain Canvas --- */
        #rose-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        /* --- Responsive Main Container --- */
        .master-card {
            width: 90vw;
            height: 80vh;
            background: var(--white);
            display: flex;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            z-index: 100;
            position: relative;
        }

        /* Photo Section */
        .photo-side {
            flex: 1.2;
            background: url('1000372340.jpg') center/cover no-repeat;
            filter: contrast(1.1);
        }

        /* Content Section */
        .text-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
            position: relative;
        }

        .label {
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.5rem;
            line-height: 1;
            color: var(--primary);
            margin-bottom: 25px;
        }

        .desc {
            color: #555;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        .btn-surprise {
            padding: 15px 40px;
            background: var(--primary);
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.4s;
            width: fit-content;
        }

        .btn-surprise:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(128, 0, 32, 0.3);
        }

        /* Floating Icons */
        .icons-float {
            position: absolute;
            top: 40px; right: 40px;
            color: var(--primary);
            text-align: center;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .master-card { flex-direction: column; height: auto; margin-top: 20px; }
            .photo-side { height: 300px; }
            .text-side { padding: 40px 20px; text-align: center; align-items: center; }
            h1 { font-size: 2.5rem; }
            .icons-float { display: none; }
        }

        /* Message Overlay */
        #message-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(128, 0, 32, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <canvas id="rose-canvas"></canvas>

    <div class="master-card">
        <div class="photo-side"></div>
        <div class="text-side">
            <div class="icons-float">
                <i class="fa-solid fa-cake-candles" style="color: var(--gold); font-size: 1.5rem;"></i>
            </div>
            <span class="label">The Exclusive Edition</span>
            <h1>Rukhsar <br> Rehmani</h1>
            <p class="desc">
                Unveiling a special digital celebration for a soul that defines elegance. May your day be as fragrant as the roses falling around you.
            </p>
            <button class="btn-surprise" onclick="showMsg()">The Surprise</button>
        </div>
    </div>

    <div id="message-overlay">
        <div>
            <h2 style="font-family: 'Bodoni Moda'; font-size: 3rem; margin-bottom: 20px;">Happy Birthday!</h2>
            <p style="font-style: italic; font-weight: 200; font-size: 1.2rem; max-width: 500px;">
                "Rukhsar, May your path always be covered in roses and your life filled with sweet celebrations."
            </p>
            <button class="btn-surprise" style="background: white; color: var(--primary); margin-top: 40px;" onclick="location.reload()">Return</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('rose-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const petals = [];
        const roseEmoji = "🌹";

        class Petal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 20 + 15;
                this.speed = Math.random() * 2 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
                this.wind = Math.random() * 1 - 0.5;
            }

            update() {
                this.y += this.speed;
                this.x += this.wind;
                this.angle += this.spin;

                if (this.y > canvas.height) {
                    this.y = -50;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`;
                ctx.fillText(roseEmoji, 0, 0);
                ctx.restore();
            }
        }

        function init() {
            for (let i = 0; i < 40; i++) {
                petals.push(new Petal());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        function showMsg() {
            document.getElementById('message-overlay').style.display = 'flex';
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
