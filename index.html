<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rehmani Edition | Birthday</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --burgundy: #800020;
            --gold: #c9a543;
            --white: #ffffff;
            --black: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Responsive Container */
        .master-container {
            width: 90%;
            max-width: 900px;
            height: 550px;
            background: var(--white);
            display: flex;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        /* Image Section (Desktop Only Side) */
        .side-image {
            flex: 1;
            background: url('1000372340.jpg') center/cover no-repeat;
            filter: contrast(1.1);
        }

        /* Content Section */
        .content-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            background: var(--white);
        }

        .label {
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--burgundy);
            line-height: 1.1;
            margin-bottom: 25px;
        }

        /* Animated Elements */
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .item { color: var(--burgundy); font-size: 1.5rem; }
        .item p { font-size: 0.6rem; color: #888; margin-top: 5px; letter-spacing: 2px; }

        .fa-rose { animation: heartBeat 2s infinite; color: #ff4d6d; }
        .fa-cake-candles { animation: pulse 2s infinite; color: var(--gold); }

        .btn-open {
            padding: 15px 30px;
            background: var(--burgundy);
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            margin: 0 auto;
        }

        .btn-open:hover {
            background: #a50029;
            transform: translateY(-2px);
        }

        /* --- Surprise Reveal Overlay --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--burgundy);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .message-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 20px; }
        .message-text { font-size: 1rem; max-width: 500px; line-height: 1.8; font-weight: 300; }

        /* --- MEDIA QUERIES (Mobile Responsiveness) --- */
        @media (max-width: 768px) {
            .master-container {
                flex-direction: column;
                height: auto;
                max-width: 380px;
                padding-bottom: 30px;
            }
            .side-image {
                height: 250px; /* Small image on top for mobile */
                width: 100%;
            }
            h1 { font-size: 2.2rem; }
            .content-panel { padding: 30px 20px; }
        }

        @media (max-width: 480px) {
            .master-container { width: 95%; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="master-container animate__animated animate__zoomIn">
        <div class="side-image"></div>
        
        <div class="content-panel">
            <span class="label">Birthday Edition</span>
            <h1>Rukhsar <br> Rehmani</h1>
            
            <div class="features">
                <div class="item">
                    <i class="fa-solid fa-rose"></i>
                    <p>GRACE</p>
                </div>
                <div class="item">
                    <i class="fa-solid fa-cake-candles"></i>
                    <p>WISHES</p>
                </div>
            </div>

            <button class="btn-open" onclick="triggerSurprise()">Reveal Surprise</button>
        </div>
    </div>

    <div id="overlay">
        <div class="animate__animated animate__fadeInDown">
            <i class="fa-solid fa-heart" style="font-size: 2rem; color: var(--gold); margin-bottom: 20px;"></i>
            <h2 class="message-title">Happy Birthday!</h2>
            <p class="message-text">"Wishing you a day that is as beautiful and amazing as you are. May all your dreams come true, Rukhsar."</p>
            <button class="btn-open" style="margin-top: 40px; border: 1px solid white; background: none;" onclick="location.reload()">Back</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function triggerSurprise() {
            document.getElementById('overlay').style.display = 'flex';
            
            // Professional Confetti blast
            var end = Date.now() + (3 * 1000);
            var colors = ['#c9a543', '#ffffff', '#ff0000'];

            (function frame() {
              confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: colors
              });
              confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: colors
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
        }
    </script>
</body>
</html>
