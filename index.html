<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebration | Rukhsar Rehmani</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-red: #800020;
            --soft-white: #fffafa;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--soft-white);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Premium Gradient Background */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, #fce4ec 100%);
            z-index: -1;
        }

        .main-card {
            background: white;
            padding: 60px;
            border-radius: 2px; /* Professional minimal look */
            box-shadow: 0 20px 50px var(--shadow);
            text-align: center;
            position: relative;
            border-top: 5px solid var(--gold);
            animation: slideUp 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--deep-red);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #888;
            margin-bottom: 40px;
        }

        /* Minimalist Animated Rose */
        .rose-box {
            margin: 30px auto;
            width: 60px;
            height: 100px;
        }

        .rose-petal {
            width: 40px;
            height: 40px;
            background: var(--deep-red);
            border-radius: 50% 50% 0 50%;
            margin: 0 auto;
            transform: rotate(45deg);
            animation: pulseRose 2s infinite ease-in-out;
            box-shadow: -5px 5px 15px rgba(128, 0, 32, 0.3);
        }

        .rose-stem {
            width: 2px;
            height: 50px;
            background: #2d6a4f;
            margin: -5px auto 0;
        }

        /* Professional Animated Cake */
        .cake-container {
            position: relative;
            margin: 50px auto;
            width: 120px;
        }

        .cake-base {
            height: 60px;
            background: #fdf0d5;
            border-bottom: 4px solid var(--gold);
            border-radius: 5px 5px 0 0;
            position: relative;
        }

        .icing {
            height: 15px;
            background: #ffb3c1;
            width: 100%;
            border-radius: 10px 10px 0 0;
            position: absolute;
            top: 0;
        }

        .candle {
            width: 6px;
            height: 25px;
            background: repeating-linear-gradient(45deg, #fff, #fff 5px, var(--gold) 5px, var(--gold) 10px);
            margin: -25px auto 0;
            position: relative;
        }

        .flame {
            width: 10px;
            height: 15px;
            background: #ff9d00;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -18px;
            left: -2px;
            animation: glow 0.5s infinite alternate;
            box-shadow: 0 0 15px #ff9d00;
        }

        /* Buttons & Interactions */
        .reveal-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 30px;
        }

        .reveal-btn:hover {
            background: var(--gold);
            color: white;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseRose {
            0%, 100% { transform: rotate(45deg) scale(1); }
            50% { transform: rotate(45deg) scale(1.1); }
        }

        @keyframes glow {
            from { opacity: 0.8; transform: scale(1); }
            to { opacity: 1; transform: scale(1.2); }
        }

        /* Message Overlay */
        #message {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="main-card">
    <div class="subtitle">Celebrating</div>
    <h1>Rukhsar Rehmani</h1>
    
    <div class="rose-box">
        <div class="rose-petal"></div>
        <div class="rose-stem"></div>
    </div>

    <div class="cake-container">
        <div class="candle"><div class="flame"></div></div>
        <div class="cake-base"><div class="icing"></div></div>
    </div>

    <p style="color: #666; line-height: 1.6; font-style: italic;">
        "Excellence is not an act, but a habit. Just like the joy you bring into my life."
    </p>
    
    <button class="reveal-btn" onclick="showMessage()">The Message</button>
</div>

<div id="message">
    <div>
        <h2 style="font-family: 'Playfair Display'; font-size: 2.5rem; color: var(--deep-red);">Happy Birthday, Rukhsar!</h2>
        <p style="margin: 20px 0; color: #555;">May your year be as elegant and brilliant as you are.</p>
        <button class="reveal-btn" onclick="location.reload()">Back</button>
    </div>
</div>

<script>
    function showMessage() {
        const msg = document.getElementById('message');
        msg.style.display = 'flex';
        msg.style.animation = 'slideUp 0.8s ease';
    }
</script>

</body>
</html>
