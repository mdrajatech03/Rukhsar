<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rehmani Edition | Birthday Celebration</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #800020; /* Deep Burgundy */
            --gold: #c9a543;
            --white: #ffffff;
            --black: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Rose Rain Canvas --- */
        #rose-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999; /* Sabse upar */
        }

        /* --- Main Responsive Card --- */
        .master-card {
            width: 90vw;
            max-width: 1000px;
            height: 80vh;
            background: var(--white);
            display: flex;
            margin: 10vh auto;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        /* Home Page Photo Section */
        .photo-side {
            flex: 1.2;
            background: url('1000372340.jpg') center/cover no-repeat;
            filter: contrast(1.05);
        }

        /* Home Page Text Section */
        .text-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .label {
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.5rem;
            line-height: 1;
            color: var(--primary);
            margin-bottom: 25px;
        }

        .desc {
            color: #555;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .btn-surprise {
            padding: 18px 45px;
            background: var(--primary);
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.4s;
            width: fit-content;
        }

        .btn-surprise:hover {
            background: #a50029;
            box-shadow: 0 15px 30px rgba(128, 0, 32, 0.3);
            transform: translateY(-3px);
        }

        /* --- Surprise Page (Overlay) --- */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(128, 0, 32, 0.98); /* Luxury Red Background */
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Photo on Next Page */
        .reveal-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            background: url('1000372340.jpg') center/cover no-repeat;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            animation: zoomIn 1s ease;
        }

        .message-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--gold);
        }

        .message-text {
            font-size: 1.1rem;
            max-width: 600px;
            line-height: 1.8;
            font-weight: 300;
            font-style: italic;
        }

        /* Mobile View Fixes */
        @media (max-width: 768px) {
            .master-card { flex-direction: column; height: auto; margin-top: 5vh; }
            .photo-side { height: 350px; }
            .text-side { padding: 40px 20px; text-align: center; align-items: center; }
            h1 { font-size: 2.8rem; }
            .reveal-photo { width: 140px; height: 140px; }
        }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="rose-canvas"></canvas>

    <div class="master-card">
        <div class="photo-side"></div>
        <div class="text-side">
            <span class="label">The Invitation</span>
            <h1>Rukhsar <br> Rehmani</h1>
            <p class="desc">
                A digital experience crafted for someone truly special. Every rose falling here carries a wish for your beautiful journey ahead.
            </p>
            <button class="btn-surprise" onclick="openSurprise()">The Surprise</button>
        </div>
    </div>

    <div id="overlay">
        <div class="reveal-photo"></div>
        
        <h2 class="message-title">Happy Birthday!</h2>
        <p class="message-text">
            "Wishing you a year as magnificent as your presence, Rukhsar. May your path always be fragrant with joy and success."
        </p>
        
        <button class="btn-surprise" style="background: white; color: var(--primary); margin-top: 40px;" onclick="location.reload()">Back to Start</button>
    </div>

    <script>
        const canvas = document.getElementById('rose-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const petals = [];
        const roseEmoji = "🌹";

        class Petal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 25 + 15;
                this.speed = Math.random() * 2 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
                this.wind = Math.random() * 1 - 0.5;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                this.angle += this.spin;
                if (this.y > canvas.height) {
                    this.y = -50;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`;
                ctx.fillText(roseEmoji, 0, 0);
                ctx.restore();
            }
        }

        function init() {
            for (let i = 0; i < 40; i++) { petals.push(new Petal()); }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function openSurprise() {
            document.getElementById('overlay').style.display = 'flex';
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
